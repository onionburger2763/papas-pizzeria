<!DOCTYPE html>
<html>
<head>
    <title>Papa's Pizzeria</title>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #player {
            width: 640px;
            height: 480px;
            max-width: 100vw;
            max-height: 100vh;
        }

        #player ruffle-player {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById("player").appendChild(player);
            player.load("papas_pizzeria.swf");
        });
    </script>
</body>
</html>
